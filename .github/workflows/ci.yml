name: CI / Release

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    name: Test ${{ matrix.os }} - Py ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install NASM (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: Install NASM (macOS)
        if: runner.os == 'macOS'
        run: brew install nasm

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Run Ruff Format Check
        run: uv run ruff format --check .

      - name: Run Ruff Linter Check
        run: uv run ruff check .

      - name: Run Pytest (Main/PR - Unix)
        if: "!startsWith(github.ref, 'refs/tags/') && runner.os != 'Windows'"
        run: uv run pytest --cov=pyjpegxl tests/test_codec.py tests/test_benchmark.py -v -s --timeout=300

      - name: Run Pytest (Main/PR - Windows)
        if: "!startsWith(github.ref, 'refs/tags/') && runner.os == 'Windows'"
        env:
          ITERATIONS: 2
        run: uv run pytest tests/test_codec.py tests/test_benchmark.py -v -s --timeout=300 --no-cov

      - name: Run Pytest (Tag - Unix)
        if: "startsWith(github.ref, 'refs/tags/') && runner.os != 'Windows'"
        run: uv run pytest --cov=pyjpegxl tests/test_codec.py tests/test_benchmark.py -v -s -k "not TestBench and not benchmark" --timeout=300

      - name: Run Pytest (Tag - Windows)
        if: "startsWith(github.ref, 'refs/tags/') && runner.os == 'Windows'"
        run: uv run pytest tests/test_codec.py tests/test_benchmark.py -v -s -k "not TestBench and not benchmark" --timeout=300 --no-cov

      - name: Upload coverage to Codecov
        if: runner.os != 'Windows'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  linux:
    name: Build Linux Wheels
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: --release --out dist -i 3.11 3.12 3.13 3.14
          sccache: 'true'
          manylinux: auto
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux
          path: dist

  windows:
    name: Build Windows Wheels
    runs-on: windows-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64-pc-windows-msvc
          args: --release --out dist -i 3.11 3.12 3.13 3.14
          sccache: 'true'
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows
          path: dist

  macos:
    name: Build macOS Wheels
    runs-on: macos-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - name: Install NASM
        run: brew install nasm
      - name: Build wheels (universal2)
        uses: PyO3/maturin-action@v1
        env:
          MACOSX_DEPLOYMENT_TARGET: "14.0"
        with:
          target: universal2-apple-darwin
          args: --release --out dist -i 3.11 3.12 3.13 3.14
          sccache: 'true'
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos
          path: dist

  sdist:
    name: Build Source Distribution
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for trusted publishing
    needs: [linux, windows, macos, sdist]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
